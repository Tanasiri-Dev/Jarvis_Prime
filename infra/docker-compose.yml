services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jarvis_prime
      POSTGRES_PASSWORD: jarvis_prime
      POSTGRES_DB: jarvis_prime
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis_prime -d jarvis_prime"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    environment:
      APP_NAME: Jarvis Prime API
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://jarvis_prime:jarvis_prime@postgres:5432/jarvis_prime
      JWT_SECRET_KEY: local-dev-secret
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres-data:
